  js_ts_ruling:
    runs-on: sonar-xl-public
    name: JS/TS Ruling
    needs: [setup, populate_npm_cache, sync_rspec]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - &checkout_with_submodules
        name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - *mise
      - *npm_cache
      - *download_rspec_rule_data
      - *rspec_secrets
      - name: Run JS/TS Ruling
        id: ruling
        run: |
          npm run generate-meta
          npm run ruling
        env:
          GITHUB_TOKEN: ${{ fromJSON(steps.rspec-secrets.outputs.vault).RSPEC_GITHUB_TOKEN }}
      - name: Update ruling and notify
        if: always() && (github.event_name == 'pull_request' || github.ref_name == github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          TARGET_REF: ${{ github.head_ref || github.ref_name }}
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          IS_PULL_REQUEST: ${{ github.event_name == 'pull_request' }}
          RULING_FAILED: ${{ steps.ruling.outcome == 'failure' }}
        run: |
          git fetch origin "$BASE_REF"
          if [ -n "$BASE_SHA" ]; then
            git fetch origin "$BASE_SHA" || true
            if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
              echo "::error::Failed to fetch PR base SHA: $BASE_SHA"
              exit 1
            fi
          fi

          # If ruling failed, sync the actual results first to get the differences
          if [ "$RULING_FAILED" = "true" ]; then
            # Check if last commit was already an auto-update (prevent infinite loop)
            LAST_COMMIT_MSG=$(git log -1 --format=%B)
            if echo "$LAST_COMMIT_MSG" | grep -q "🤖 Generated with GitHub Actions"; then
              echo "Last commit was an auto-update, skipping to prevent infinite loop"
              exit 0
            fi

            # Sync ruling results (this modifies its/ruling/...)
            npm run ruling-sync
          fi

          # Generate report comparing against base branch (after sync if ruling failed)
          node tools/ruling-report.js > ruling-report.md

          # Check if there are ruling differences
          if [ -s ruling-report.md ]; then
            HAS_DIFFERENCES=true
          else
            HAS_DIFFERENCES=false
          fi

          FIX_BRANCH="fix/update-ruling-for-${TARGET_REF}"

          if [ "$IS_PULL_REQUEST" = "true" ]; then
            FIX_PR_TITLE="Update ruling results for PR #${PR_NUMBER}"
            FIX_PR_BODY="Auto-generated ruling update for PR #${PR_NUMBER}.

          🤖 Generated with GitHub Actions"
          else
            FIX_PR_TITLE="Update ruling results for ${TARGET_REF}"
            FIX_PR_BODY="Auto-generated ruling update for ${TARGET_REF}.

          🤖 Generated with GitHub Actions"
          fi

          get_open_fix_pr_url() {
            gh pr list \
              --head "$FIX_BRANCH" \
              --base "$TARGET_REF" \
              --state open \
              --json url \
              --jq '.[0].url // empty'
          }

          # Create/update fix PR if ruling failed and there are differences
          if [ "$RULING_FAILED" = "true" ] && [ "$HAS_DIFFERENCES" = "true" ]; then
            # Stash changes before checkout
            git stash push -m "ruling-sync-changes" -- its/ruling/src/test/expected/

            git fetch origin "$TARGET_REF"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            if git ls-remote --exit-code origin "refs/heads/$FIX_BRANCH" > /dev/null 2>&1; then
              git checkout -b "$FIX_BRANCH" "origin/$TARGET_REF"
              git stash pop
              git add its/ruling/src/test/expected/

              if git diff --staged --quiet; then
                echo "No ruling changes to commit"
              else
                git commit -m "Update ruling results

          🤖 Generated with GitHub Actions"
                git push --force-with-lease origin "$FIX_BRANCH"
              fi
              FIX_PR_URL=$(get_open_fix_pr_url 2>/dev/null || true)
              if [ -z "${FIX_PR_URL:-}" ]; then
                FIX_PR_URL=$(gh pr create \
                  --title "$FIX_PR_TITLE" \
                  --base "$TARGET_REF" \
                  --head "$FIX_BRANCH" \
                  --body "$FIX_PR_BODY")
              fi
            else
              git checkout -b "$FIX_BRANCH" "origin/$TARGET_REF"
              git stash pop
              git add its/ruling/src/test/expected/

              if git diff --staged --quiet; then
                echo "No ruling changes to commit"
              else
                git commit -m "Update ruling results

          🤖 Generated with GitHub Actions"
                git push origin "$FIX_BRANCH"
                FIX_PR_URL=$(gh pr create \
                  --title "$FIX_PR_TITLE" \
                  --base "$TARGET_REF" \
                  --head "$FIX_BRANCH" \
                  --body "$FIX_PR_BODY")
              fi
            fi
          else
            # No changes needed — clean up stale fix PR if one exists and is still open
            FIX_PR_STATE=$(gh pr view "$FIX_BRANCH" --json state --jq '.state' 2>/dev/null || true)
            if [ "$FIX_PR_STATE" = "OPEN" ]; then
              gh pr close "$FIX_BRANCH" --comment "No longer needed — the original PR is now up to date."
              git push origin --delete "$FIX_BRANCH" 2>/dev/null || true
            fi
          fi

          if [ "$IS_PULL_REQUEST" = "true" ]; then
            # Build comment with marker for identification
            MARKER="<!-- ruling-report -->"
            if [ "$HAS_DIFFERENCES" = "true" ]; then
              # Build comment with ruling changes
              {
                echo "$MARKER"
                cat ruling-report.md
                echo ""
                if [ "$RULING_FAILED" = "true" ] && [ -n "${FIX_PR_URL:-}" ]; then
                  echo "---"
                  echo "❌ **Ruling needs updating.** A fix PR has been created: ${FIX_PR_URL}"
                  echo ""
                  echo "Please review and merge it into your branch."
                fi
              } > comment.md
            else
              # Build comment for no changes
              {
                echo "$MARKER"
                echo "## Ruling Report"
                echo ""
                echo "✅ **No changes to ruling expected issues in this PR**"
              } > comment.md
            fi

            # Truncate comment to 50KB to stay within GitHub API limits
            MAX_BYTES=50000
            if [ "$(wc -c < comment.md)" -gt "$MAX_BYTES" ]; then
              head -c "$MAX_BYTES" comment.md > comment-truncated.md
              echo "" >> comment-truncated.md
              echo "_(truncated — full report too large for PR comment)_" >> comment-truncated.md
              mv comment-truncated.md comment.md
            fi

            # Find existing ruling comment and update it, or create new one
            EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)

            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" \
                -X PATCH -F body=@comment.md
            else
              gh pr comment "$PR_NUMBER" --body-file comment.md
            fi
          elif [ -n "${FIX_PR_URL:-}" ]; then
            {
              echo "## Ruling Report"
              echo ""
              echo "❌ **Ruling needs updating.** A fix PR has been created: ${FIX_PR_URL}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Ruling Report"
              echo ""
              echo "✅ **No ruling fix PR was needed for this run.**"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # Fail CI if ruling needs updating
          if [ "$RULING_FAILED" = "true" ] && [ "$HAS_DIFFERENCES" = "true" ]; then
            if [ -n "${FIX_PR_URL:-}" ]; then
              echo "::error::Ruling results are out of date. See fix PR: ${FIX_PR_URL}"
            else
              echo "::error::Ruling results are out of date."
            fi
            exit 1
          fi

  ruling:
    runs-on: sonar-xl-public
    name: Ruling Test
    needs: [setup, build]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    permissions: *read_permissions
    steps:
      - *checkout_with_submodules
      - *mise
      - *maven_cache
      - *download_sonarjs_m2
      - *config_maven
      - *get_licenses_token
      - uses: ./.github/actions/orchestrator-cache
        with:
          save: 'false'
      - name: Run Ruling Tests
        run: |
          cd its/ruling
          # Cap ruling parallelism explicitly: using all CPUs on sonar-xl-public can
          # overwhelm the shared SonarQube/Node workload and make the runner drop.
          mvn test -Dtest=RulingTest -DskipTests=false -Dsonar.runtimeVersion=LATEST_RELEASE -Dmaven.test.redirectTestOutputToFile=false -Djunit.jupiter.execution.parallel.config.strategy=fixed -Djunit.jupiter.execution.parallel.config.fixed.parallelism=8 -B -e -V
        env:
          SONARSOURCE_QA: true
          GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).licenses_token }}
      - name: Upload ruling differences
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruling-differences
          path: its/ruling/target/actual/

  # IRIS tasks (nightly only)
  run_iris:
    runs-on: sonar-xs-public
    name: IRIS SQ NEXT -> ${{ matrix.shadow-name }}
    needs: [analyze_primary, analyze_shadows]
    if: github.event_name == 'schedule'
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - shadow-name: SonarCloud EU
            shadow-platform: SQC-EU
          - shadow-name: SonarQube US
            shadow-platform: SQC-US
    steps:
      - uses: SonarSource/unified-dogfooding-actions/run-iris@v1
        with:
          primary_project_key: org.sonarsource.javascript:javascript
          primary_platform: Next
          shadow1_project_key: SonarSource_SonarJS
          shadow1_platform: ${{ matrix.shadow-platform }}

  promote:
    runs-on: sonar-xs-public
    needs:
      - build
      - build_win
      - test_js
      - test_js_win
      - analyze_primary
      - test_eslint_plugin
      - plugin_qa_with_node
      - plugin_qa_without_node
      - plugin_qa_fast_with_node
      - plugin_qa_fast_without_node
      - plugin_qa_without_node_alpine
      - plugin_qa_fast_without_node_alpine
      - plugin_qa_win
      - plugin_qa_sonarlint_win
      - plugin_qa_win_fast_with_node
      - ruling
      - js_ts_ruling
    if: >-
      !failure() && !cancelled() &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    permissions: *read_permissions
    steps:
      - *checkout
      - *mise
      - uses: SonarSource/ci-github-actions/promote@v1
        with:
          promote-pull-request: true

  releasability:
    runs-on: sonar-xs-public
    name: Releasability
    needs:
      - promote
    if: >-
      github.ref_name == github.event.repository.default_branch ||
      startsWith(github.ref_name, 'branch-') ||
      startsWith(github.ref_name, 'dogfood-')
    permissions:
      id-token: write
      statuses: write
      contents: read
    steps:
      - uses: SonarSource/gh-action_releasability/releasability-status@v3
        with:
          optional_checks: "Jira"
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
