name: Automated Release
on:
  workflow_dispatch:
    inputs:
      short-description:
        description: "Short description for the REL ticket"
        required: true
        type: string
      sq-ide-short-description:
        description: "Short summary of SQ IDE related changes (optional, falls back to short-description)"
        required: false
        type: string
      sqc-integration:
        description: "Integrate into SQC"
        type: boolean
        default: true
      sqs-integration:
        description: "Integrate into SQS"
        type: boolean
        default: true
      sqaa-integration:
        description: "Integrate into SQAA"
        type: boolean
        default: true
      branch:
        description: "Branch from which to do the release"
        required: true
        default: "master"
        type: string
      new-version:
        description: "New version to release (without -SNAPSHOT; if left empty, the current minor version will be auto-incremented)"
        required: false
        type: string
      rule-props-changed:
        description: >
          "@RuleProperty" changed? See SC-4654
        type: boolean
        default: false

jobs:
  release:
    name: Release
    uses: SonarSource/release-github-actions/.github/workflows/automated-release.yml@v1
    permissions:
      statuses: write
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      project-name: "SonarJS"
      plugin-name: "javascript"
      jira-project-key: "JS"
      rule-props-changed: ${{ github.event.inputs.rule-props-changed }}
      short-description: ${{ github.event.inputs.short-description }}
      sq-ide-short-description: ${{ github.event.inputs.sq-ide-short-description }}
      new-version: ${{ github.event.inputs.new-version }}
      sqc-integration: ${{ github.event.inputs.sqc-integration == 'true' }}
      sqs-integration: ${{ github.event.inputs.sqs-integration == 'true' }}
      # SonarJS uses a custom SQAA workflow that builds the Docker image from the
      # release tag and updates analysis/js_ts_image_tag in sonar-analysis-as-a-service.
      sqaa-integration: false
      create-slvs-ticket: true
      create-slvscode-ticket: true
      create-sle-ticket: true
      create-sli-ticket: true
      branch: ${{ github.event.inputs.branch }}
      pm-email: "gabriel.vivas@sonarsource.com"
      slack-channel: "squad-corelang-releases"
      release-automation-secret-name: "SonarJS-release-automation"
      runner-environment: "github-ubuntu-latest-s"
      verbose: true
      use-jira-sandbox: false
      is-draft-release: false

  sqaa_release:
    name: Release SQAA
    needs: release
    if: ${{ needs.release.result == 'success' && github.event.inputs.sqc-integration == 'true' && github.event.inputs.sqaa-integration == 'true' }}
    uses: ./.github/workflows/sqaa-release.yml
    permissions:
      id-token: write
      contents: read
    with:
      ref: refs/tags/${{ needs.release.outputs.release-version }}
      release-version: ${{ needs.release.outputs.release-version }}
      publish-to-release-repo: true
      ticket-url: ${{ needs.release.outputs.sqc-ticket-url }}
      create-aaas-pr: true
      reviewers: ${{ github.actor }}
      release-automation-secret-name: "SonarJS-release-automation"

  bump_versions:
    name: Bump versions
    needs:
      - release
      - sqaa_release
    if: ${{ needs.release.result == 'success' && (needs.sqaa_release.result == 'success' || needs.sqaa_release.result == 'skipped') }}
    uses: ./.github/workflows/bump-versions.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      version: ${{ needs.release.outputs.new-version }}
