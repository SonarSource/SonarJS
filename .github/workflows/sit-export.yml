name: SIT Export

# The SIT exporter is always built from the workflow ref (HEAD of the
# PR). For baseline runs we additionally check out the baseline ref into
# `baseline-src/` and build the plugin from those sources; the exporter
# binary itself stays at HEAD so this workflow keeps working on PRs that
# introduce or update the SIT infra.

on:
  workflow_call:
    inputs:
      plugin_ref:
        description: "Git ref to build the plugin from (used only when build_plugin is true). Empty means the workflow ref."
        required: false
        default: ""
        type: string
      rules_json:
        description: "Changed rules JSON (canonical SIT/FPS payload)"
        required: true
        type: string
      artifact_name:
        description: "Uploaded artifact name"
        required: true
        type: string
      sonarjs_m2_artifact_name:
        description: "Optional SonarJS Maven repository artifact containing a pre-built plugin"
        required: false
        default: ""
        type: string
      build_plugin:
        description: "Build the plugin from sources at plugin_ref before export"
        required: false
        default: false
        type: boolean

jobs:
  sit-export:
    name: SIT Export
    runs-on: sonar-l
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Checkout source code (workflow ref)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - uses: jdx/mise-action@v4.1.0
        with:
          version: 2025.11.2
          mise_toml: |
            [tools]
            java = "21.0"
            maven = "3.9"
            node = "24.11.0"

      - name: Configure Maven
        uses: SonarSource/ci-github-actions/config-maven@master
        with:
          artifactory-reader-role: private-reader
          disable-caching: 'true'

      - name: Get RSPEC GitHub token
        id: rspec-secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-rspec token | RSPEC_GITHUB_TOKEN;

      - name: Build SIT exporter (from workflow ref)
        run: mvn -f its/sit-exporter/pom.xml package -DskipTests -B -e -V

      - name: Download pre-built SonarJS Maven artifacts
        if: inputs.sonarjs_m2_artifact_name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.sonarjs_m2_artifact_name }}
          path: build/sonarjs-m2

      - name: Checkout plugin sources (baseline ref)
        if: inputs.build_plugin
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.plugin_ref }}
          path: baseline-src
          submodules: false

      - name: Cache NPM dependencies (baseline)
        if: inputs.build_plugin
        id: baseline-npm-cache
        uses: SonarSource/gh-action_cache@v1
        with:
          path: baseline-src/node_modules
          key: npm-baseline-${{ runner.os }}-${{ hashFiles('baseline-src/package-lock.json', 'baseline-src/patches/*') }}

      - name: Configure npm registry (baseline)
        if: inputs.build_plugin && steps.baseline-npm-cache.outputs.cache-hit != 'true'
        uses: SonarSource/ci-github-actions/config-npm@v1

      - name: Install NPM dependencies (baseline)
        if: inputs.build_plugin && steps.baseline-npm-cache.outputs.cache-hit != 'true'
        working-directory: baseline-src
        run: npm ci

      - name: Build baseline plugin
        if: inputs.build_plugin
        working-directory: baseline-src
        env:
          GITHUB_TOKEN: ${{ fromJSON(steps.rspec-secrets.outputs.vault).RSPEC_GITHUB_TOKEN }}
        run: mvn -pl sonar-plugin/sonar-javascript-plugin -am package -DskipTests -B -e -V

      - name: Run SIT exporter
        env:
          RULES_JSON: ${{ inputs.rules_json }}
          PLUGIN_REF: ${{ inputs.plugin_ref || github.sha }}
        run: |
          set -euo pipefail

          mkdir -p build/sit-export
          printf '%s\n' "$RULES_JSON" > build/sit-rules.json

          find_latest_plugin_jar() {
            local root="$1"
            if [ ! -d "$root" ]; then
              return 0
            fi
            find "$root" -name 'sonar-javascript-plugin-*-multi.jar' -type f 2>/dev/null | sort | tail -n 1
          }

          plugin_jar="$(find_latest_plugin_jar baseline-src/sonar-plugin/sonar-javascript-plugin/target)"
          if [ -z "$plugin_jar" ]; then
            plugin_jar="$(find_latest_plugin_jar build/sonarjs-m2)"
          fi
          if [ -z "$plugin_jar" ]; then
            plugin_jar="$(find_latest_plugin_jar sonar-plugin/sonar-javascript-plugin/target)"
          fi
          if [ -z "$plugin_jar" ]; then
            plugin_jar="$(find_latest_plugin_jar "$HOME/.m2/repository/org/sonarsource/javascript/sonar-javascript-plugin")"
          fi
          if [ -z "$plugin_jar" ]; then
            echo "Could not find sonar-javascript-plugin-*-multi.jar" >&2
            exit 1
          fi
          echo "Using plugin jar: $plugin_jar"

          java -jar its/sit-exporter/target/javascript-it-sit-exporter-*.jar \
            --projects-json dev-tools/peach-analysis/javascript/projects.json \
            --rules-json build/sit-rules.json \
            --output-dir build/sit-export \
            --plugin-jar "$plugin_jar" \
            --commit "$PLUGIN_REF"

      - name: Upload SIT export bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: build/sit-export/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
