name: ruling_bot
description: Generate sonar-lits ruling reports, update PR comments, and manage fix PRs

inputs:
  github-token:
    description: GitHub token used for PR comments and fix PR management
    required: true
  pr-number:
    description: Pull request number when the workflow runs on a PR
    required: false
    default: ''
  target-ref:
    description: Branch name targeted by ruling maintenance updates
    required: true
  base-ref:
    description: Base branch or ref used for ruling comparison
    required: true
  base-sha:
    description: Exact base SHA when available
    required: false
    default: ''
  is-pull-request:
    description: Whether the current workflow run is for a pull request
    required: true
  ruling-failed:
    description: Whether the preceding ruling execution failed
    required: true
  new-results-path:
    description: Path to freshly generated ruling results produced by sonar-lits
    required: true
  old-results-path:
    description: Path to version-controlled baseline ruling results
    required: true
  sources-path:
    description: Path to the local sonar-lits sources checkout used for inline code snippets
    required: false
    default: its/sources
  sources-repo-url:
    description: Base URL of the remote sonar-lits sources repository used for file links in PR comments
    required: false
    default: ''
  rspec-base-url:
    description: Base URL used for RSPEC links in PR comments
    required: false
    default: https://sonarsource.github.io/rspec/#/rspec
  max-inline-snippets:
    description: Maximum number of inline snippets to embed before collapsing the remaining report
    required: false
    default: '10'

runs:
  using: composite
  steps:
    - name: Run ruling bot
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        TARGET_REF: ${{ inputs.target-ref }}
        BASE_REF: ${{ inputs.base-ref }}
        BASE_SHA: ${{ inputs.base-sha }}
        IS_PULL_REQUEST: ${{ inputs.is-pull-request }}
        RULING_FAILED: ${{ inputs.ruling-failed }}
        NEW_RESULTS_PATH: ${{ inputs.new-results-path }}
        OLD_RESULTS_PATH: ${{ inputs.old-results-path }}
        SOURCES_PATH: ${{ inputs.sources-path }}
        SOURCES_REPO_URL: ${{ inputs.sources-repo-url }}
        RSPEC_BASE_URL: ${{ inputs.rspec-base-url }}
        MAX_INLINE_SNIPPETS: ${{ inputs.max-inline-snippets }}
      run: bash "$ACTION_PATH/run.sh"
